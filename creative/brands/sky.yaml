# ─────────────────────────────────────────────────
# 品牌 Profile：光遇 (Sky: Children of the Light)
# ─────────────────────────────────────────────────
# 这是一个完整的品牌 profile 示例。
# 可以参考此文件为自己的品牌创建 profile。

name: "光遇 (Sky: Children of the Light)"
company: thatgamecompany
category: 治愈系社交冒险游戏
one_liner: 一款强调人与人之间温暖连接的非竞技手游

# ── 品牌原则 ──────────────────────────────────────
# 所有创意产出必须遵守的核心原则
principles:
  - name: 美而不炫
    do: 云海、晚霞、缓慢飞翔
    dont: 爆炸、特效、快速剪切
  - name: 情感先行
    do: 先让人感受到什么，再传递信息
    dont: 功能罗列、参数展示
  - name: 连接而非孤立
    do: 画面中有两个或多个角色的互动
    dont: 单人站立展示
  - name: 邀请而非推销
    do: "来看看这个世界"
    dont: "快下载！限时优惠！"
  - name: 真实而非过度包装
    do: 游戏内真实能体验到的美
    dont: 过度渲染、虚假宣传

# ── 视觉词库 ──────────────────────────────────────
# 生成 prompt 时可以使用的视觉描述关键词
visual:
  colors:
    - 金色暖光
    - 柔和渐变
    - 日落橙粉
    - 黎明浅蓝
    - 星空深紫
    - 蜡烛暖黄
    - 云白
    - 草地翠绿
    - 雨林深绿
    - 荒漠土金
  lighting:
    - 逆光剪影
    - 丁达尔效应 (god rays)
    - 柔和漫射光
    - 蜡烛微光
    - 光之翼发光
    - 晨雾散射光
    - 水面反射
  textures:
    - 水彩画风
    - 油画质感
    - 柔焦梦幻
    - 布料飘动感
    - 云朵体积感
    - 粒子特效
    - 手绘动画风
    - 纸张纹理
  moods:
    - 治愈系
    - 空灵感
    - 诗意
    - 怀旧温暖
    - 童话般
    - 宁静祥和
    - 神秘深邃
    - 庄严宏大
    - 轻快活泼
    - 淡淡忧伤
  camera:
    - 缓慢推进
    - 环绕旋转
    - 从特写拉至全景
    - 跟随飞行
    - 仰拍天空
    - 俯瞰云海
    - 穿越云层
    - 固定机位长镜头

# ── 场景/世界观 ──────────────────────────────────
# 品牌相关的典型场景和视觉环境
scenes:
  - name: 晨岛
    name_en: Isle of Dawn
    vibe: 金色日出、新生
    keywords: golden sunrise, vast open meadow, morning light
  - name: 云野
    name_en: Daylight Prairie
    vibe: 蝴蝶草地、自由飞翔
    keywords: butterflies, green meadows, soaring through clouds
  - name: 雨林
    name_en: Hidden Forest
    vibe: 雨雾神秘、幽暗探索
    keywords: rain, misty forest, bioluminescent plants, mysterious
  - name: 霞谷
    name_en: Valley of Triumph
    vibe: 冰场极光、欢乐社交
    keywords: ice rink, aurora sky, playful atmosphere
  - name: 荒漠
    name_en: Golden Wasteland
    vibe: 戏剧天空、史诗废墟
    keywords: dramatic skies, ancient ruins, golden dust storms
  - name: 禁阁
    name_en: Vault of Knowledge
    vibe: 星辰图书馆、知识沉思
    keywords: starlit ceiling, constellations, grand library
  - name: 伊甸
    name_en: Eye of Eden
    vibe: 极端光芒、牺牲感动
    keywords: intense light, emotional crescendo, rebirth
  - name: 遇境
    name_en: Home Space
    vibe: 温馨蜡烛、归属日常
    keywords: cozy interior, warm candle light, personal space

# ── 角色/主体描述 ────────────────────────────────
# 品牌内容中常见的角色或主体
characters:
  default: >
    小小的、可爱的、穿着斗篷的人形角色，
    没有明显面部特征（只有两只发光的眼睛），
    身后有发光的翅膀（光之翼）。
    身高矮小，头身比接近Q版。
  variants:
    - name: 新手 (萌新)
      look: 灰褐色短斗篷，1-2级翅膀
    - name: 中期玩家
      look: 各色斗篷，多级翅膀，各类发型
    - name: 赛季装扮
      look: 与赛季主题匹配的特色服饰

# ── 视觉风格参考 ─────────────────────────────────
style_references:
  - 宫崎骏/吉卜力动画的温暖色调和世界感
  - 水彩画般的柔和光影
  - 陈星汉 (Jenova Chen) 游戏美学——Journey, Flower, Sky

# ── 负面提示（AI 生成时要避免的） ──────────────────
negative_prompts:
  - 不要写实风格
  - 不要暗黑/哥特色调
  - 不要现代建筑或科技感元素
  - 不要尖锐线条或机械质感
  - 不要竞技/暴力/对抗画面
  - 不要过度饱和的荧光色

# ── 文案调性（如需配文） ─────────────────────────
tone:
  principles:
    - name: 意境 (Yìjìng)
      desc: 创造画面感和氛围，不只传递信息
    - name: 留白 (Liúbái)
      desc: 少即是多，留给观众想象空间
    - name: 节奏感 (Jiézòu Gǎn)
      desc: 3字/4字/7字短句组合，有音乐感
    - name: 共情 (Gòngqíng)
      desc: 像朋友分享，不像品牌公告
    - name: 网感 (Wǎng Gǎn)
      desc: 符合目标平台的语言风格
  do:
    - 温暖、诗意、邀请式
    - 用"你"而不是"用户"
    - 用画面感的语言
  dont:
    - 催促性语言（快、赶紧、限时）
    - 竞品对比（最好的、唯一的）
    - 过度承诺
    - 感叹号轰炸

# ── 目标平台偏好 ─────────────────────────────────
# 可选：品牌重点投放的平台
preferred_platforms:
  - 抖音
  - B站
  - 小红书
  - 微信
  - 微博
