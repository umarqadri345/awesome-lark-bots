# ─────────────────────────────────────────────────
# 品牌 Profile 模板
# ─────────────────────────────────────────────────
# 复制此文件，重命名为你的品牌名（如 mybrand.yaml），
# 填写各项内容即可。不确定的字段可以留空或删除。
#
# 也可以用工具自动生成：python main.py --create-brand

name: ""          # 品牌名称
company: ""       # 公司名称
category: ""      # 品牌类别（如：美妆、3C数码、餐饮、游戏）
one_liner: ""     # 一句话描述品牌

# ── 品牌原则 ──────────────────────────────────────
# 你的品牌最核心的3-5条创意原则
principles:
  - name: ""      # 原则名称（如：年轻活力）
    do: ""        # 应该怎么做
    dont: ""      # 不应该怎么做
  # - name: ""
  #   do: ""
  #   dont: ""

# ── 视觉词库 ──────────────────────────────────────
# 描述品牌视觉风格的关键词，越多越好
visual:
  colors: []      # 品牌色彩关键词，如：[明亮黄, 克莱因蓝, 活力橙]
  lighting: []    # 光影风格，如：[自然光, 影棚高光, 霓虹灯]
  textures: []    # 质感/材质，如：[磨砂质感, 金属光泽, 棉麻肌理]
  moods: []       # 氛围情绪，如：[潮酷, 温馨, 极简, 复古]
  camera: []      # 运镜风格，如：[快速剪切, 定格动画, 航拍, 手持跟拍]

# ── 场景/世界观 ──────────────────────────────────
# 品牌内容常见的视觉场景
scenes:
  - name: ""
    vibe: ""          # 场景氛围描述
    keywords: ""      # 英文关键词（给 AI 工具用）
  # - name: ""
  #   vibe: ""
  #   keywords: ""

# ── 角色/主体描述 ────────────────────────────────
# 品牌内容中的核心视觉元素或角色
characters:
  default: ""         # 默认主体描述（产品外观/品牌形象/代言人等）
  variants: []        # 可选：不同变体
  # variants:
  #   - name: ""
  #     look: ""

# ── 视觉风格参考 ─────────────────────────────────
# 参考的视觉风格、艺术家、品牌
style_references: []
  # - 某某品牌的广告风格
  # - 某某摄影师的光影风格
  # - 某某动画/电影的美术风格

# ── 负面提示 ─────────────────────────────────────
# AI 生成时需要排除的视觉元素
negative_prompts: []
  # - 不要什么
  # - 避免什么

# ── 文案调性 ─────────────────────────────────────
tone:
  do: []              # 文案应该是什么样的
    # - 简洁有力
    # - 年轻化口语
  dont: []            # 文案不应该是什么样的
    # - 过于正式
    # - 用老派广告腔

# ── 目标平台偏好 ─────────────────────────────────
preferred_platforms: []
  # - 抖音
  # - 小红书
