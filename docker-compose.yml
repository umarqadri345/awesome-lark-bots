version: "3.8"

services:
  brainstorm:
    build: .
    command: python3 -m brainstorm
    env_file: .env
    restart: always
    volumes:
      - ./runs:/app/runs

  planner:
    build: .
    command: python3 -m planner
    env_file: .env
    restart: always
    volumes:
      - ./runs:/app/runs

  assistant:
    build: .
    command: python3 -m assistant
    env_file: .env
    restart: always
    environment:
      - TZ=Asia/Shanghai   # 定时任务 08:00/18:00 按中国时间执行
    volumes:
      - ./data:/app/data
      - ./runs:/app/runs

  creative:
    build: .
    command: python3 -m creative
    env_file: .env
    restart: always

  sentiment:
    build: .
    command: python3 -m sentiment
    env_file: .env
    restart: always
    volumes:
      - ./data:/app/data

  newsbot:
    build: .
    command: python3 -m newsbot
    env_file: .env
    restart: always

  conductor:
    build: .
    command: python3 -m conductor
    env_file: .env
    restart: always
    volumes:
      - ./data:/app/data
      - ./runs:/app/runs

  studio:
    build: .
    command: streamlit run studio/app.py --server.port 8501 --server.address 0.0.0.0 --server.headless true --server.baseUrlPath studio --server.enableXsrfProtection false
    env_file: .env
    restart: always
    ports:
      - "127.0.0.1:8501:8501"
    volumes:
      - ./runs:/app/runs
      - ./data:/app/data
